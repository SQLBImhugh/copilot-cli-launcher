name: ci

# Manual + PR only. We run builds and tests LOCALLY for routine
# development (see scripts/test.ps1 and scripts/build.ps1) to keep
# GH Actions usage at zero on direct pushes to main. CI exists as:
#   - a safety net for PRs (when we eventually open them)
#   - an on-demand artifact builder via workflow_dispatch
on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'legacy/**'
      - 'docs/**'
      - 'mockups/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Build + upload portable .exe artifact (slower, ~3 min publish step)'
        type: boolean
        default: true

# Cancel in-flight runs when superseded.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore CopilotLauncher.sln

      - name: Build (full solution incl. WinUI app)
        run: dotnet build CopilotLauncher.sln -c Release --no-restore

      - name: Test (Core via xUnit)
        run: dotnet test CopilotLauncher.sln -c Release --no-build --verbosity normal

  publish-portable:
    # Manual artifact build. NEVER runs on push or PR — only when you click
    # "Run workflow" from the Actions tab and leave publish=true.
    needs: build-and-test
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish single-file portable
        # Self-contained .NET 8 + Windows App Runtime; ~70-80 MB compressed exe.
        # See ci.yml history for the rationale on each property override.
        run: |
          dotnet publish src/CopilotLauncher/CopilotLauncher.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:EnableMsixTooling=true `
            -p:WindowsAppSDKSelfContained=true `
            -p:AppxPackage=false `
            -p:WindowsPackageType=None `
            -o publish/CopilotLauncher

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CopilotLauncher-portable-${{ github.sha }}
          path: publish/CopilotLauncher/
          if-no-files-found: error
          retention-days: 7


