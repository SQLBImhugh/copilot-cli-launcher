name: ci

# Triggers — kept tight to stay under the GH Actions free-tier minutes budget.
# Windows runners count 2x against the budget, so a 4-min run = 8 quota minutes.
on:
  # PR: always validate code changes before merge.
  pull_request:
    paths-ignore:
      - '**.md'
      - 'legacy/**'
      - 'docs/**'
      - 'mockups/**'
      - '.gitignore'
      - 'LICENSE'
  # Push to main: only when source actually changes (skip doc-only commits).
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'legacy/**'
      - 'docs/**'
      - 'mockups/**'
      - '.gitignore'
      - 'LICENSE'
  # Manual: lets users (or me) trigger a fresh build artifact on demand.
  workflow_dispatch:
    inputs:
      publish:
        description: 'Build + upload portable .exe artifact (slower, ~3 min publish step)'
        type: boolean
        default: true

# Cancel in-flight runs when a new commit lands on the same branch/PR.
# Saves wasted minutes on builds that are about to be superseded.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-latest
    # Modest timeout — typical run is ~3-4 min; cap at 10 to catch hangs early.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore CopilotLauncher.sln

      - name: Build (full solution incl. WinUI app)
        run: dotnet build CopilotLauncher.sln -c Release --no-restore

      - name: Test (Core via xUnit)
        run: dotnet test CopilotLauncher.sln -c Release --no-build --verbosity normal

  publish-portable:
    # Publishes the self-contained portable .exe and uploads as artifact.
    # Only runs on manual workflow_dispatch (with publish=true, the default)
    # — NOT on every push or PR — so we don't burn minutes/storage on
    # builds the user isn't going to download. Run from the Actions tab
    # when you want a fresh artifact to test.
    needs: build-and-test
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish single-file portable
        # Self-contained .NET 8 runtime baked in; ~38 MB compressed exe.
        # PublishSingleFile requires EnableMsixTooling=true for embedded
        # resources.pri generation. We keep =false at the project level so
        # ordinary 'dotnet build' works on machines without VS Build Tools;
        # override only here, on a runner that does have them.
        #
        # WindowsAppSDKSelfContained=true bundles the Windows App Runtime
        # DLLs into the app folder so end users don't get the
        # "Please install Windows App Runtime 1.6" dialog on first launch.
        # Without this flag, the app is framework-dependent on a system-
        # installed Windows App Runtime which most fresh Windows machines
        # don't have. Adds ~30-40 MB to the bundle (~70-80 MB total) but
        # makes the .exe truly portable / install-free.
        run: |
          dotnet publish src/CopilotLauncher/CopilotLauncher.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:EnableMsixTooling=true `
            -p:WindowsAppSDKSelfContained=true `
            -p:AppxPackage=false `
            -p:WindowsPackageType=None `
            -o publish/CopilotLauncher

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CopilotLauncher-portable-${{ github.sha }}
          path: publish/CopilotLauncher/
          if-no-files-found: error
          # 7 days instead of the default 90; we're tight on the 0.5 GB
          # included storage budget.
          retention-days: 7


