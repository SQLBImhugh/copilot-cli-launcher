name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore CopilotLauncher.sln

      - name: Build
        run: dotnet build CopilotLauncher.sln -c Release --no-restore

      - name: Test
        run: dotnet test CopilotLauncher.sln -c Release --no-build --verbosity normal
